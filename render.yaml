databases:
  - name: hna-acadex-db
    databaseName: hna_acadex_db
    region: oregon
    plan: free

services:
  # Main Django Web Service
  - type: web
    name: hna-acadex-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --timeout 120"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hna-acadex-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "0"
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set in Render Dashboard (must be https:// origins for browser clients)
      - key: CSRF_TRUSTED_ORIGINS
        sync: false  # Set in Render Dashboard (https:// frontend and backend admin origins)
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DJANGO_LOG_LEVEL
        value: "INFO"
      - key: CORE_LOG_LEVEL
        value: "INFO"
      - key: JWT_ACCESS_TOKEN_MINUTES
        value: "15"
      - key: JWT_REFRESH_TOKEN_DAYS
        value: "180"
      - key: AUTH_COOKIE_USE_SESSION
        value: "1"
      - key: DJANGO_SU_EMAIL
        value: "admin@hna-acadex.edu"
      - key: DJANGO_SU_PASSWORD
        generateValue: true
      - key: FRONTEND_URL
        sync: false  # Set in Render Dashboard to your frontend app URL
      - key: CELERY_BROKER_URL
        sync: false  # Set when enabling Celery worker/beat services
      - key: CELERY_RESULT_BACKEND
        sync: false  # Set when enabling Celery worker/beat services
      # Brevo API for email
      - key: BREVO_API_KEY
        sync: false  # Set in Render Dashboard
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@hnaacadex.org"
      # Cloudinary for media storage (avatars)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false  # Set in Render Dashboard
      - key: CLOUDINARY_API_KEY
        sync: false  # Set in Render Dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false  # Set in Render Dashboard
      # Firebase
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false  # Set in Render Dashboard
