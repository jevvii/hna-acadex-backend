databases:
  - name: hna-acadex-db
    databaseName: hna_acadex_db
    region: oregon
    plan: free

services:
  # Main Django Web Service
  - type: web
    name: hna-acadex-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --timeout 120"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hna-acadex-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "1"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DJANGO_SU_EMAIL
        value: "admin@hna-acadex.edu"
      - key: DJANGO_SU_PASSWORD
        generateValue: true
      - key: FRONTEND_URL
        value: "exp://exp.host/@hnaadmin/hna-acadex"
      # Brevo API for email
      - key: BREVO_API_KEY
        sync: false  # Set in Render Dashboard
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@hnaacadex.org"
      # Cloudinary for media storage (avatars)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false  # Set in Render Dashboard
      - key: CLOUDINARY_API_KEY
        sync: false  # Set in Render Dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false  # Set in Render Dashboard
      # Firebase
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false  # Set in Render Dashboard