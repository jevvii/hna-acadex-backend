databases:
  - name: hna-acadex-db
    databaseName: hna_acadex_db
    region: oregon
    plan: free

services:
  # Main Django Web Service
  - type: web
    name: hna-acadex-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --timeout 120"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hna-acadex-db
          property: connectionString
      # IMPORTANT: After first deploy, copy the generated DJANGO_SECRET_KEY
      # from this service and set the same value for celery-worker and celery-beat
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "1"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DJANGO_SU_EMAIL
        value: "admin@hna-acadex.edu"
      - key: DJANGO_SU_PASSWORD
        generateValue: true
      - key: FRONTEND_URL
        value: "exp://exp.host/@hnaadmin/hna-acadex"
      # Email Settings
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: "hnaacadexadmin@gmail.com"
      - key: EMAIL_HOST_PASSWORD
        sync: false  # Set in Render Dashboard
      - key: DEFAULT_FROM_EMAIL
        value: "hnaacadexadmin@gmail.com"
      # Celery/Redis Settings - Upstash Redis
      - key: CELERY_BROKER_URL
        sync: false  # Set in Render Dashboard: rediss://default:PASSWORD@HOST:6379
      - key: CELERY_RESULT_BACKEND
        sync: false  # Set in Render Dashboard: rediss://default:PASSWORD@HOST:6379
      # Firebase - Set in Render Dashboard
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false  # Set in Render Dashboard

  # Celery Worker for Background Tasks
  - type: worker
    name: hna-acadex-celery-worker
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "celery -A config.celery worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hna-acadex-db
          property: connectionString
      # Copy DJANGO_SECRET_KEY from web service after first deploy
      - key: DJANGO_SECRET_KEY
        sync: false  # Set same value as web service
      - key: DJANGO_DEBUG
        value: "0"
      - key: CELERY_BROKER_URL
        sync: false  # Set same value as web service
      - key: CELERY_RESULT_BACKEND
        sync: false  # Set same value as web service
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false  # Set same value as web service

  # Celery Beat Scheduler
  - type: worker
    name: hna-acadex-celery-beat
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "celery -A config.celery beat --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hna-acadex-db
          property: connectionString
      # Copy DJANGO_SECRET_KEY from web service after first deploy
      - key: DJANGO_SECRET_KEY
        sync: false  # Set same value as web service
      - key: DJANGO_DEBUG
        value: "0"
      - key: CELERY_BROKER_URL
        sync: false  # Set same value as web service
      - key: CELERY_RESULT_BACKEND
        sync: false  # Set same value as web service