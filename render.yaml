databases:
  - name: hna-acadex-db
    databaseName: hna_acadex_db
    region: oregon
    plan: free

services:
  - type: web
    name: hna-acadex-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hna-acadex-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "1"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DJANGO_SU_USERNAME
        value: "admin"
      - key: DJANGO_SU_EMAIL
        value: "admin@hna-acadex.edu"
      - key: DJANGO_SU_PASSWORD
        generateValue: true