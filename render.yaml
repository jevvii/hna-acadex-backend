databases:
  - name: hna-acadex-db
    databaseName: hna_acadex_db
    region: oregon
    plan: free

services:
  # Main Django Web Service
  - type: web
    name: hna-acadex-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hna-acadex-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "0"
      - key: CORS_ALLOWED_ORIGINS
        # Update this with your actual frontend URLs
        value: "https://your-frontend.vercel.app,exp://exp.host"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DJANGO_SU_EMAIL
        value: "admin@hna-acadex.edu"
      - key: DJANGO_SU_PASSWORD
        generateValue: true
      - key: FRONTEND_URL
        # Update this with your actual frontend URL
        value: "https://your-frontend.vercel.app"
      # Email Settings
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: "hnaacadexadmin@gmail.com"
      - key: EMAIL_HOST_PASSWORD
        # Set this in Render Dashboard as a Secret File - your Gmail app password
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "hnaacadexadmin@gmail.com"
      # Celery/Redis Settings (connects to Redis service below)
      - key: CELERY_BROKER_URL
        value: "redis://hna-acadex-redis:6379/0"
      - key: CELERY_RESULT_BACKEND
        value: "redis://hna-acadex-redis:6379/0"
      # Firebase - set FIREBASE_CREDENTIALS_JSON in Render Dashboard
      # as the entire JSON content of your firebase credentials file
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false

  # Redis for Celery
  - type: redis
    name: hna-acadex-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru

  # Celery Worker for Background Tasks
  - type: worker
    name: hna-acadex-celery-worker
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "celery -A config.celery worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hna-acadex-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: CELERY_BROKER_URL
        value: "redis://hna-acadex-redis:6379/0"
      - key: CELERY_RESULT_BACKEND
        value: "redis://hna-acadex-redis:6379/0"
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false

  # Celery Beat Scheduler
  - type: worker
    name: hna-acadex-celery-beat
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "celery -A config.celery beat --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hna-acadex-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: CELERY_BROKER_URL
        value: "redis://hna-acadex-redis:6379/0"
      - key: CELERY_RESULT_BACKEND
        value: "redis://hna-acadex-redis:6379/0"